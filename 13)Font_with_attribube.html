<!DOCTYPE html>
<html>
	<head>
		<title>Font Tag Attribute</title>
	</head>
	<body bgcolor="orange">
		<h1><center>Font Tag with size attribute</center></h1>
		<font size="1">HET</font>
		<hr>
		<font size="2">HET</font>
		<hr>
		<font size="3">HET</font>
		<hr>
		<font size="4">HET</font>
		<hr>
		<font size="5">HET</font>
		<hr>
		<font size="6">HET</font>
		<hr>
		<font size="7">HET</font>
		<hr>
		<h1><center>Font Tag with color attribute</center></h1>
		<font color="red">Het</font>
		<hr>
		<font color="Black">Het</font>
		<hr>
		<font color="Green">Het</font>
		<hr>	
		<font color="Blue">Het</font>
		<hr>
		<font color="Purple">Het</font>
		<hr>
		<h1><center>Font Tag with face attribute</center></h1>
		<font face="Cursive">Het</font>
		<hr>
		<font face="Fantasy">Het</font>
		<hr>
		<font face="Serif">Het</font>
		<hr>
		<font face="sens-Serif">Het</font>
		<hr>
		<font face="Monospace">Het</font>
		<hr>
	</body>
</html>

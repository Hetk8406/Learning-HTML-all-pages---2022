<!DOCTYPE html>	
<html>
	<head>
		<title>Student Registration form</title>
		</head>
		<body bgcolor="cyan">
			<h1><center>Student Form</center></h1>
			<hr>
			<form>
		
			Enter your Name:
			<input type="text" name="Username">
			<br><br>
			Gender:
			<input type="radio" name="Gender" id="Gender">Male
			<input type="radio" name="Gender" id="Gender">Female
			<br><br>
			DOB:
			<input type="date" name="birthday" id="birthday">
			<br><br>
			Mobile No:
			<input type="text" name="Mobile">
			<br><br>
			Hobbies:
			<br>
			<input type="Checkbox" name="Swimming" id="Swimming">Swimming
			<br>
			<input type="Checkbox" name="Cricket" id="Cricket">Cricket
			<br>
			<input type="Checkbox" name="Badmintion" id="Badmintion">Badminton
			<br><br>
			Other:
			<textarea rows="3" cols="10"></textarea>
			<br><br>
			Address:
			<textarea rows="5" cols="50"></textarea>
			<br><br>
			Course:
			<input type="text" name="Course">
			<br><br>
			Email:
			<input type="Email" name="Email" id="Email">
			<br><br>
			Password:
			<input type="Password" name="Password" id="Password">
			<br><br>
			Country:
			<select name="Country" id="register_country" style="width: 160px">
			<option value="Hindustan">Hindustan</option>
			<option value="Canada">Canada</option>
			<option value="America">America</option>
			<option value="Africa">Africa</option>
			</select>
			<br><br>
			<input type="Submit" name="Submit" id="Submit">
		</form>
		</body>
		</html>

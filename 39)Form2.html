<!DOCTYPE html>	
<html>
	<head>
		<title>FORM2</title>
		</head>
		<body bgcolor="cyan">
			<form>
				<h3><center>Form Tags</center></h3>
				<hr>
				Enter your name
				<input type="text" name="Username">
				<br><br>
				First Name 
				<input type="text" name="firstname">
				<br><br>
				Last Name
				<input type="text" name="lastname">
				<br><br>
				Email id:
				<input type="Email" name="Email" id="Email">
				<br><br>
				Password
				<input type="Password" id="Password" name="Password">
				<br><br>
				Enter your address
				<textarea rows="5" cols="40"></textarea>
				<br><br>
				Gender
				<input type="radio" name="Gender" id="Gender" value="male">Male
				<input type="radio" name="Gender" id="Gender" value="Female">Female
				<br><br>
				Hobbies<br>
				Java<input type="Checkbox" name="Java" id="Java" value="Java">
				PHP<input type="Checkbox" name="PHP" id="PHP" value="PHP">
				C<input type="Checkbox" name="C" id="C" value="C">
				C++<input type="Checkbox" name="C++" id="C++" value="C++">
				HTML<input type="Checkbox" name="HTML" id="HTML" value="HTML">
				<br><br>
				<input type="Submit" name="Submit">
				<input type="Reset" name="Reset">
			</form>
		</body>
		</html>

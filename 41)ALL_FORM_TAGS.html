<!DOCTYPE html>	
<html>
	<head>
		<title>ALL FORM TAGS</title>
		</head>
		<body bgcolor="cyan">
			<form>
			<td align="Center">
				<input type="button" onclick="alert('Hello World')" value="Click me!">
				<br><br>
				<input type="color" name="olive" id="olive">
				<br><br>
				Birthday
				<input type="date" id="Birthday" name="Birthday">
				<br><br>
				MAX date
				<input type="date" name="datamax" id="datamax" max="2022-12-31">
				<br><br>
				MIN date
				<input type="date" name="datamax" id="datamax" min="2000-12-31">
				<br><br>
				<input type="datetime-local" name="birthdaytime" id="birthdaytime">
				<br><br>
				Placeholder
				<input type="email" placeholder="het@gmail.com">
				<br><br>
				Choose File
				<input type="File" id="File" name="File">
				<br><br>
				Image
				<input type="Image" src="Chocobar.jpg" alt="Submit" width="50" height="50">
				<br><br>
				<label for="quantity">Number(between 1 to 10):</label>
				<input type="Number" id="quantity" name="quantity" min="1" max="10">
				<br><br>
				Password --
				<label for="pass">Password(8 min char):</label>
				<input type="Password" id="Password" name="Password" minlength="8" required>
				<br><br>
				Range --
				<label for="vol">Volume(1 to 50):</label>
				<input type="Range" id="vol" name="vol" min="0" max="50">
				<br><br>
				Search the site
				<input type="search" id="site-search" name="q">
				<br><br>
				Tel
				<input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}">
				<br><br>
				URL
				<input type="url" id="myURL" name="myURL" placeholder="http://www.gmail.com"/>
				<br><br>
				
				<br><br>
				<input type="Submit" name="Submit" id="Submit">
				
			</td>
		</form>
		</body>
		</html>

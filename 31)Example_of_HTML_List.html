<!DOCTYPE html>	
<html>
	<head>
		<title>Example of HTML list</title>
		</head>
		<body>
			<h2>Unordered List</h2>
			<ul>
				<li>Java</li>
				<li>PHP</li>
				<li>.NET</li>
			</ul>
			<hr>
			<h2>Ordered List</h2>
			<ol>
				<li>Java</li>
				<li>PHP</li>
				<li>.NET</li>
			</ol>
			<hr>
			<h2>Defination List</h2>
			<dl>
				<dt>Java</dt>
				<dd>
					It is oop language
				</dd>
				<dt>PHP</dt>
				<dd>
					It is open source
				</dd>
				<dt>.NET</dt>
				<dd>
					.NET is also a programming lanuage
				</dd>
			</dl>
		</body>
		</html>

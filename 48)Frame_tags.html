<!DOCTYPE html>	
<html>
	<head>
		<title>Frame Tag</title>
	</head>
		<frameset cols="50% ,50%">
		<frame name="top" src="https://en.wikipedia.org/wiki/Basketball"></frame>
		<frame name="bottom" src="https://en.wikipedia.org/wiki/Cricket"></frame>
			<noframes>
				<body>
					The browser you are working does not support frames
				</body>
			</noframes>
		</frameset>
</html>

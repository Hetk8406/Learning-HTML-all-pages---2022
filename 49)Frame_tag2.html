<!DOCTYPE html>	
<html>
	<head>
		<title>Frame Tag</title>
	</head>
	<frameset cols="30%, 40%, 30%"> 
		<frame name="top" src="cricket.jpg"></frame>
		<frame name="main" src="basketball.jpg"></frame>
		<frame name="bottom" src="badminton.jpg"></frame>
		<noframes>
			<body>
				The browser you are working does not support frames
			</body>
		</noframes>
	</frameset>
	</html>

<!DOCTYPE html>	
<html>
	<head>
		<title>FORM</title>
		</head>
		<body bgcolor="cyan">
			<form>
				<h3><center>Form Tags</center></h3>
				<hr>
				Enter your name
				<input type="text" name="Username">
				<br><br>
				First Name 
				<input type="text" name="firstname">
				<br><br>
				Last Name
				<input type="text" name="lastname">
				<br><br>
				Enter your address
				<textarea rows="5" cols="40"></textarea>
				<br><br>
				<label for="firstname">FirstName:</label>
				<input type="text" id="firstname" name="lastname">
				<br><br>
				<label for="lastname">LastName:</label>
				<input type="text" id="lastname" name="lastname">
				<br><br>
				Password
				<input type="Password" id="Password" name="Password">
				<br><br>
				Email id:
				<input type="Email" name="Email" id="Email">
				<br><br>
				<input type="Submit" name="Submit">
				Gender
				<input type="radio" name="Gender" id="Gender" value="male"checked>Male
				<input type="radio" name="Gender" id="Gender" value="Female">female
				<br><br>
				Hobbies Checkbox
				<br><br>
				Cricket
				<input type="Checkbox" name="cricket" id="cricket" value="cricket">
				Swimming
				<input type="Checkbox" name="Swimming" id="Swimming" value="Swimming">
				Badminton
				<input type="Checkbox" name="Badminton" id="Badminton" value="Badminton">
				All of the Above
				<input type="Checkbox" name="All" id="All" value="All">
				<br><br>
			</form>
		</body>
		</html>

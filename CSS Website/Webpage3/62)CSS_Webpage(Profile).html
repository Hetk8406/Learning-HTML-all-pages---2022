<!DOCTYPE html>	
<html>
	<head>
		<title>CSS Webpage(Profile)</title>
	</head>
	<style type="text/css">
	.profile
	{
		box-shadow: 30px 30px 30px ;
		margin: auto;
		width: 410px;
		background-color: cyan;
		font-family: arial;
		text-align: center; 
	}	
	title
	{
		color: grey;
		font-size: 18px;
	}
	button
	{
		border: none;
		background-color: black;
		outline: 0;
		padding: 8px;
		color: white;
		text-align: center;
		cursor: pointer;
		width: 100%;
		font-size: 18px;
	}
	button:hover, a:hover
	{
		opacity: 0.7;
	}
	</style>
	<body>
		<br>
		<h2><center>User Profile Card</center></h2>
		<br>
		<div class="profile">
			<img src="Elon.jpg">
			<h1>Elon Musk</h1>
				<p>CEO of Tesla Motors</p>
				<p>University of Pennsylvania</p>
				<p><button>Contact</button></p>
		</div>
	</body>
	</html>
